<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bef264;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a3e635;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#grad2)" rx="40"/>
  
  <!-- Soccer ball circle -->
  <circle cx="100" cy="100" r="85" fill="url(#grad1)"/>
  
  <!-- Soccer ball pattern -->
  <!-- Main hexagon in center -->
  <polygon points="100,55 130,72 130,105 100,122 70,105 70,72" fill="#1e293b" opacity="0.8"/>
  
  <!-- Top pentagon -->
  <polygon points="100,55 115,65 110,80 90,80 85,65" fill="#1e293b" opacity="0.6"/>
  
  <!-- Bottom pentagon -->
  <polygon points="100,122 115,112 130,105 115,130 85,130 70,105" fill="#1e293b" opacity="0.6"/>
  
  <!-- Left pentagon -->
  <polygon points="70,72 65,87 75,98 85,90 80,75" fill="#1e293b" opacity="0.6"/>
  
  <!-- Right pentagon -->
  <polygon points="130,72 135,87 125,98 115,90 120,75" fill="#1e293b" opacity="0.6"/>
  
  <!-- Decorative accent line (like ball stitching) -->
  <path d="M 85 70 Q 100 65 115 70" stroke="#1e293b" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 85 130 Q 100 135 115 130" stroke="#1e293b" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
